services:
  redis:
    image: redis:7-alpine
    container_name: interviewos-redis
    ports:
      - '6379:6379'
    volumes:
      - interviewos-redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - interviewos

volumes:
  interviewos-redis:

networks:
  interviewos:
    name: interviewos
